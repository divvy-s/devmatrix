version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: web3_social_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: web3_social
    network_mode: "host"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: web3_social_redis
    network_mode: "host"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: web3_social_adminer
    network_mode: "host"
    depends_on:
      - postgres

volumes:
  postgres_data:
